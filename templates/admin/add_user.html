{% extends "base.html" %}
{% block title %}Add User â€” DevSpace{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <div class="page-title"><i class="bi bi-person-plus"></i> Add New User</div>
        <nav aria-label="breadcrumb" class="mt-1">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.users') }}">Users</a></li>
                <li class="breadcrumb-item active">Add</li>
            </ol>
        </nav>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-person-plus"></i> User Details</div>
            <div class="card-body">
                <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-4">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name"
                               required placeholder="John Doe">
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email"
                               required placeholder="john@example.com">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               required minlength="6" placeholder="At least 6 characters">
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select" id="role" name="role">
                                <option value="user">User</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="plan" class="form-label">Plan</label>
                            <select class="form-select" id="plan" name="plan">
                                <option value="free">Free â€” 1 project</option>
                                <option value="basic">Basic â€” 5 projects</option>
                                <option value="pro">Pro â€” Unlimited</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between gap-2 pt-2" style="border-top:1px solid var(--border);">
                        <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-person-check"></i> Create User
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
