<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
    <div style="text-align:center; max-width:480px; animation: fadeUp 0.4s ease;">
        <div style="font-size:96px; font-weight:800; color:var(--danger); opacity:0.4; line-height:1; letter-spacing:-4px; margin-bottom:16px;">500</div>
        <h1 style="font-size:22px; font-weight:700; margin-bottom:10px;">Internal Server Error</h1>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:28px; line-height:1.7;">
            Something went wrong on our end. Please try again in a moment.
        </p>
        <a href="{{ url_for('main.dashboard') if current_user.is_authenticated else url_for('auth.login') }}"
           class="btn btn-primary">
            <i class="bi bi-house"></i> Back to Home
        </a>
    </div>
</div>
</body>
</html>
